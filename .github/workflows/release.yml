name: "Release"

on:
  push:
    tags:
      - "v*"
      - "devbox-v*"
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.0)'
        required: true
        type: string
      branch:
        description: '目标分支 (例如: main, feat/urlencodeTool)'
        required: true
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  validate-tag:
    name: 校验 Tag 来源并提取版本
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      suffix: ${{ steps.meta.outputs.suffix }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验 Tag 来源分支
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          
          # 判断 tag 后缀，确定目标分支
          if [[ "$TAG" == *"-urlencode"* ]]; then
            TARGET_BRANCH="feat/urlencodeTool"
          else
            TARGET_BRANCH="main"
          fi
          
          echo "📋 Tag: $TAG"
          echo "🎯 目标分支: $TARGET_BRANCH"
          
          git fetch origin "$TARGET_BRANCH" --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$TARGET_BRANCH"; then
            echo "❌ 当前 tag 对应提交不在 $TARGET_BRANCH 分支上"
            exit 1
          fi
          echo "✅ Tag 来源校验通过"

      - name: 提取版本信息
        id: meta
        run: |
          set -euo pipefail
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # 手动触发
            VERSION="${{ github.event.inputs.version }}"
            SUFFIX="${{ github.event.inputs.branch }}"
            if [ "$SUFFIX" != "main" ]; then
              TAG="v${VERSION}-${SUFFIX}"
            else
              TAG="v${VERSION}"
            fi
          else
            # Tag 触发
            TAG="${GITHUB_REF_NAME}"
            VERSION="$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
            # 提取后缀（如 -urlencode）
            SUFFIX="$(echo "$TAG" | sed -E 's/^v[0-9]+\.[0-9]+\.[0-9]+//' | sed 's/^-//')"
          fi
          
          if [ -z "$VERSION" ]; then
            echo "❌ 无法提取版本号"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "✅ 发布版本: $VERSION${SUFFIX:+-$SUFFIX}"

  build-windows:
    name: 构建 Windows 版本
    needs: validate-tag
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装前端依赖
        working-directory: ./frontend
        run: npm install

      - name: 设置应用图标
        run: |
          Copy-Item -Path "assets/icon.png" -Destination "build/appicon.png" -Force
          Write-Host "✅ 图标设置完成"

      - name: 构建 Windows x64 版本
        env:
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          wails build -platform windows/amd64 -ldflags "-X main.version=${{ needs.validate-tag.outputs.version }}"

      - name: 重命名构建产物
        run: |
          $source = "build/bin/DevBox.exe"
          $target = "DevBox_windows_x64.exe"
          $targetPath = "build/bin/" + $target

          if (Test-Path $source) {
            Rename-Item -Path $source -NewName $target
            Write-Host "✅ 重命名完成: $targetPath"
          } else {
            Write-Host "❌ 未找到构建产物: $source"
            exit 1
          }

      - name: 上传构建产物到 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-x64
          path: build/bin/*.exe
          if-no-files-found: error

  build-macos:
    name: 构建 macOS 版本
    needs: validate-tag
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            platform: x64
          - arch: arm64
            goarch: arm64
            platform: arm64
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: 安装 create-dmg
        run: |
          brew install create-dmg

      - name: 安装前端依赖
        working-directory: ./frontend
        run: npm install

      - name: 设置应用图标
        run: |
          cp assets/icon.png build/appicon.png
          echo "✅ 图标设置完成"

      - name: 构建 macOS ${{ matrix.platform }} 版本
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          wails build -platform darwin/${{ matrix.goarch }} -ldflags "-X main.version=${{ needs.validate-tag.outputs.version }}"

      - name: 创建 DMG 安装包
        run: |
          ARCH="${{ matrix.platform }}"
          APP_NAME="DevBox"
          APP_PATH="build/bin/${APP_NAME}.app"
          DMG_NAME="${APP_NAME}_macos_${ARCH}.dmg"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 未找到 .app 文件: $APP_PATH"
            ls -la build/bin/
            exit 1
          fi

          create-dmg \
            --volname "${APP_NAME} Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "${APP_NAME}.app" 200 190 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 600 185 \
            "build/bin/${DMG_NAME}" \
            "$APP_PATH"

          echo "✅ DMG 创建完成: build/bin/${DMG_NAME}"

      - name: 上传构建产物到 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ matrix.arch }}
          path: build/bin/*.dmg
          if-no-files-found: error

  release:
    name: 创建 Release 并上传
    needs: [validate-tag, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: '*-build-*'
          merge-multiple: true

      - name: 列出构建产物
        run: |
          echo "📦 构建产物列表:"
          ls -la ./artifacts/

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: "DevBox v${{ needs.validate-tag.outputs.version }}${{ needs.validate-tag.outputs.suffix && format('-{0}', needs.validate-tag.outputs.suffix) || '' }}"
          body: |

            | 平台 | 架构 | 文件名 |
            |------|------|--------|
            | Windows | x64 (64位) | DevBox_windows_x64.exe |
            | macOS | x64 (Intel) | DevBox_macos_x64.dmg |
            | macOS | arm64 (Apple Silicon) | DevBox_macos_arm64.dmg |

            ### 安装说明

            #### Windows
            1. 下载对应架构的可执行文件
            2. 双击运行即可使用

            #### macOS
            1. 下载对应架构的 DMG 文件
            2. 双击打开 DMG
            3. 将应用拖到 Applications 文件夹
            4. 首次运行可能需要前往 系统设置 > 隐私与安全性 允许运行

          files: |
            ./artifacts/*.exe
            ./artifacts/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
